<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cycle Tracker - HealHer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --pink-dark: #f06292;
            --pink-light: #fde2ea;
            --deep: #880e4f;
            --period-color: #ff5252;
            --ovulation-color: #7c4dff;
            --fertile-color: #b388ff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, var(--pink-light), #ffffff);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .back-link {
            text-decoration: none;
            color: var(--deep);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        h1 {
            color: var(--deep);
            font-size: 24px;
            margin: 0;
            text-align: center;
            flex-grow: 1;
        }

        /* CALENDAR STYLES */
        .calendar-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .current-month {
            font-weight: 700;
            font-size: 18px;
            color: var(--deep);
        }

        .nav-btns button {
            background: var(--pink-light);
            border: none;
            color: var(--deep);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            font-size: 14px;
            transition: 0.2s;
            position: relative;
        }

        .day:hover {
            background-color: var(--pink-light);
        }

        .day.today {
            border: 2px solid var(--pink-dark);
            font-weight: bold;
        }

        .day.period {
            background-color: var(--period-color) !important;
            color: white;
        }

        .day.predicted {
            background-color: #ffcdd2 !important;
            border: 1px dashed var(--period-color);
        }

        .day.ovulation {
            background-color: var(--ovulation-color) !important;
            color: white;
        }

        .day.fertile {
            background-color: var(--fertile-color) !important;
            color: white;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            font-size: 11px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* REMINDERS */
        .reminders-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .reminders-card h2 {
            font-size: 18px;
            color: var(--deep);
            margin-top: 0;
            margin-bottom: 15px;
        }

        .reminder-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .reminder-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .reminder-item:last-child {
            border-bottom: none;
        }

        .reminder-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .reminder-info h3 {
            margin: 0;
            font-size: 15px;
            color: #333;
        }

        .reminder-info p {
            margin: 2px 0 0;
            font-size: 12px;
            color: #777;
        }

        footer {
            margin-top: 30px;
            text-align: center;
        }

        button.log-btn {
            background: linear-gradient(90deg, var(--pink-dark), var(--deep));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(240, 98, 146, 0.4);
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <header>
        <a href="dashboard.html" class="back-link">← Dash</a>
        <h1>Cycle Tracker</h1>
        <div style="width: 50px;"></div> <!-- Spacer -->
    </header>

    <div class="calendar-card">
        <div class="cal-header">
            <div class="current-month" id="monthDisplay">Month Year</div>
            <div class="nav-btns">
                <button onclick="prevMonth()">&lt;</button>
                <button onclick="nextMonth()">&gt;</button>
            </div>
        </div>
        
        <div class="weekdays">
            <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
        </div>
        
        <div class="days" id="daysGrid">
            <!-- Days populated by JS -->
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot" style="background: var(--period-color)"></div> Period</div>
            <div class="legend-item"><div class="dot" style="background: #ffcdd2; border:1px dashed var(--period-color)"></div> Predicted</div>
            <div class="legend-item"><div class="dot" style="background: var(--ovulation-color)"></div> Ovulation</div>
            <div class="legend-item"><div class="dot" style="background: var(--fertile-color)"></div> Fertile</div>
        </div>
    </div>

    <div class="reminders-card">
        <h2>Cycle Reminders</h2>
        <div class="reminder-list" id="reminderList">
            <!-- Reminders populated by JS -->
        </div>
    </div>

    <footer>
        <button class="log-btn" onclick="window.location.href='period-tracking.html'">Update Cycle Data</button>
    </footer>
</div>

<script>
    // --- STATE ---
    let currentDate = new Date();
    let cycleData = {
        lastPeriodDate: null, // Date object
        cycleLength: 28,
        periodDuration: 5
    };

    // --- INITIALIZATION ---
    function init() {
        loadData();
        renderCalendar();
        renderReminders();
    }

    function loadData() {
        // Try to load from localStorage first
        const stored = localStorage.getItem('cycleData');
        if (stored) {
            const data = JSON.parse(stored);
            cycleData.lastPeriodDate = data.lastPeriodDate ? new Date(data.lastPeriodDate) : null;
            cycleData.cycleLength = parseInt(data.cycleLength) || 28;
            cycleData.periodDuration = parseInt(data.periodDuration) || 5;
        } else {
            // Fallback to periodAnswers from sessionStorage
            const scout = sessionStorage.getItem('periodAnswers');
            if (scout) {
                const answers = JSON.parse(scout);
                if (answers[0]) cycleData.lastPeriodDate = new Date(answers[0]);
                if (answers[1]) cycleData.periodDuration = parseInt(answers[1]) || 5;
                if (answers[2]) cycleData.cycleLength = parseInt(answers[2]) || 28;
                
                // Save to localStorage so it persists beyond session
                saveData();
            }
        }
    }

    function saveData() {
        localStorage.setItem('cycleData', JSON.stringify(cycleData));
    }

    // --- CALENDAR LOGIC ---
    function renderCalendar() {
        const month = currentDate.getMonth();
        const year = currentDate.getFullYear();
        
        const monthNames = ["January", "February", "March", "April", "May", "June",
          "July", "August", "September", "October", "November", "December"
        ];
        document.getElementById('monthDisplay').innerText = `${monthNames[month]} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const grid = document.getElementById('daysGrid');
        grid.innerHTML = '';

        // Empty slots for previous month
        for (let i = 0; i < firstDay; i++) {
            const div = document.createElement('div');
            grid.appendChild(div);
        }

        const today = new Date();
        today.setHours(0,0,0,0);

        for (let d = 1; d <= daysInMonth; d++) {
            const date = new Date(year, month, d);
            const div = document.createElement('div');
            div.classList.add('day');
            div.innerText = d;

            if (date.getTime() === today.getTime()) {
                div.classList.add('today');
            }

            // Cycle Highlighting
            const status = getDayStatus(date);
            if (status) div.classList.add(status);

            grid.appendChild(div);
        }
    }

    function getDayStatus(date) {
        if (!cycleData.lastPeriodDate) return null;

        const msInDay = 24 * 60 * 60 * 1000;
        const diff = Math.floor((date - cycleData.lastPeriodDate) / msInDay);
        const dayInCycle = ((diff % cycleData.cycleLength) + cycleData.cycleLength) % cycleData.cycleLength;

        // Note: diff < 0 means dates before the last logged period
        // We only show predictions for the future/present cycles relative to lastPeriodDate
        
        // 1. Check if it's the actual logged period (first cycle)
        if (diff >= 0 && diff < cycleData.periodDuration) {
            return 'period';
        }

        // 2. Predicted future periods
        if (diff >= cycleData.cycleLength) {
             if (dayInCycle < cycleData.periodDuration) {
                 return 'predicted';
             }
        }

        // 3. Ovulation (approx center of cycle - 14 days before next)
        const ovulationDay = cycleData.cycleLength - 14;
        if (dayInCycle === ovulationDay) {
            return 'ovulation';
        }

        // 4. Fertile Window (approx ovulation +/- 2 days)
        if (dayInCycle >= ovulationDay - 2 && dayInCycle <= ovulationDay + 2) {
            return 'fertile';
        }

        return null;
    }

    function prevMonth() {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    }

    function nextMonth() {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    }

    // --- REMINDERS LOGIC ---
    function renderReminders() {
        const list = document.getElementById('reminderList');
        list.innerHTML = '';

        if (!cycleData.lastPeriodDate) {
            list.innerHTML = `<p style="text-align:center; color:#999;">No cycle data yet. Click update to start tracking!</p>`;
            return;
        }

        const today = new Date();
        today.setHours(0,0,0,0);

        const msInDay = 24 * 60 * 60 * 1000;
        const diff = Math.floor((today - cycleData.lastPeriodDate) / msInDay);
        const dayInCycle = ((diff % cycleData.cycleLength) + cycleData.cycleLength) % cycleData.cycleLength;
        const daysToNext = cycleData.cycleLength - dayInCycle;

        const reminders = [];

        // 1. Period Status
        if (dayInCycle < cycleData.periodDuration) {
            reminders.push({
                icon: '🩸',
                bg: '#ffebee',
                color: varStyle('--period-color'),
                title: 'Period Day ' + (dayInCycle + 1),
                desc: 'Keep hydrated and rest well.'
            });
        } else {
            reminders.push({
                icon: '📅',
                bg: '#fff3e0',
                color: '#ff9800',
                title: 'Next Period',
                desc: `Expected in ${daysToNext} days.`
            });
        }

        // 2. Ovulation Prediction
        const ovulationDay = cycleData.cycleLength - 14;
        const daysToOvulation = ovulationDay - dayInCycle;

        if (dayInCycle === ovulationDay) {
            reminders.push({
                icon: '✨',
                bg: '#f3e5f5',
                color: varStyle('--ovulation-color'),
                title: 'Ovulation Day',
                desc: 'Your fertility is at its peak today.'
            });
        } else if (daysToOvulation > 0 && daysToOvulation <= 5) {
            reminders.push({
                icon: '🌸',
                bg: '#ede7f6',
                color: varStyle('--fertile-color'),
                title: 'Fertile Window',
                desc: `High fertility starts in ${daysToOvulation} days.`
            });
        }

        reminders.forEach(r => {
            const item = document.createElement('div');
            item.classList.add('reminder-item');
            item.innerHTML = `
                <div class="reminder-icon" style="background:${r.bg}; color:${r.color}">${r.icon}</div>
                <div class="reminder-info">
                    <h3>${r.title}</h3>
                    <p>${r.desc}</p>
                </div>
            `;
            list.appendChild(item);
        });
    }

    function varStyle(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // Run
    init();

</script>
</body>
</html>
