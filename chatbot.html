<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HealHer AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --pink-dark: #f06292;
      --pink-light: #fde2ea;
      --deep: #880e4f;
      --bg: #fdfafb;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER */
    .header {
      background: linear-gradient(180deg, var(--pink-dark), #f8bbd0);
      padding: 20px;
      color: white;
      text-align: center;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      z-index: 10;
    }

    .header h2 {
      margin: 0;
      font-size: 20px;
    }

    .header p {
      margin-top: 5px;
      font-size: 13px;
      opacity: 0.9;
    }

    .back-btn {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      text-decoration: none;
      font-size: 24px;
      font-weight: bold;
    }

    /* CHAT CONTAINER */
    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: linear-gradient(180deg, #fff, var(--pink-light));
    }

    .message {
      max-width: 80%;
      padding: 12px 18px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.5;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      animation: fadeIn 0.3s ease-out;
    }

    .message.bot {
      background: white;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: linear-gradient(135deg, var(--deep), var(--pink-dark));
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    /* TYPING INDICATOR */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
      border-radius: 20px;
      background: white;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #ccc;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    /* INPUT AREA */
    .input-area {
      padding: 15px 20px;
      background: white;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 30px;
      border: 1px solid #e0e0e0;
      outline: none;
      font-size: 14px;
      background: #f9f9f9;
      transition: 0.3s;
    }

    .input-area input:focus {
      border-color: var(--pink-dark);
      background: white;
    }

    .send-btn {
      background: var(--deep);
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(136, 14, 79, 0.3);
      transition: 0.2s;
    }

    .send-btn:hover {
      transform: scale(1.05);
      background: var(--pink-dark);
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* Markdown rendering simplifications */
    .message.bot strong {
        color: var(--deep);
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="dashboard.html" class="back-btn">‹</a>
    <h2>HealHer AI 🌸</h2>
    <p>Ask me about health, cycles, or PCOD tips!</p>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="message bot">
      Hi there! I'm HealHer AI. How can I support your wellness journey today? Feel free to ask me for health tips, period advice, or stress-relief strategies!
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask a health question..." onkeypress="handleEnter(event)">
    <button class="send-btn" onclick="sendMessage()">
      <svg fill="currentColor" viewBox="0 0 24 24">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
      </svg>
    </button>
  </div>

  <script>
    const OPENROUTER_API_KEY = "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";

    const chatContainer = document.getElementById("chatContainer");
    const userInput = document.getElementById("userInput");

    // Conversation history to maintain context
    let conversationHistory = [
      {
        role: "system",
        content: "You are HealHer AI, a compassionate, highly knowledgeable, and supportive women's wellness assistant. You specialize in answering questions about menstrual cycles, PCOD, hormonal balance, mental health, and general wellness. Keep your answers concise, structured (use bullet points if helpful), friendly, and easy to read. You are not a doctor, so gently remind users to consult a physician for serious medical concerns."
      }
    ];

    function handleEnter(e) {
      if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage(text, "user");
      userInput.value = "";
      conversationHistory.push({ role: "user", content: text });

      const typingId = showTypingIndicator();
      scrollToBottom();

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
             // Using a reliable, fast, and free open model for robustness
            "model": "meta-llama/llama-3.1-8b-instruct:free",
            "messages": conversationHistory
          })
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        removeTypingIndicator(typingId);
        
        const botReply = data.choices && data.choices[0] && data.choices[0].message
            ? data.choices[0].message.content
            : "I'm sorry, I encountered an issue retrieving that tip. Could you try asking again?";

        conversationHistory.push({ role: "assistant", content: botReply });
        appendMessage(botReply, "bot");

      } catch (error) {
        console.error("Chatbot API Error:", error);
        removeTypingIndicator(typingId);
        appendMessage("Oops! The network seems busy right now. Please check your connection and try again.", "bot");
      }
      scrollToBottom();
    }

    function appendMessage(text, sender) {
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      
      // Basic markdown bold parsing for bot responses to make them pretty
      if (sender === "bot") {
          let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
          formattedText = formattedText.replace(/\n/g, '<br>');
          div.innerHTML = formattedText;
      } else {
          div.innerText = text;
      }
      
      chatContainer.appendChild(div);
      scrollToBottom();
    }

    function showTypingIndicator() {
      const id = "typing-" + Date.now();
      const div = document.createElement("div");
      div.className = "typing";
      div.id = id;
      div.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
      chatContainer.appendChild(div);
      return id;
    }

    function removeTypingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
  </script>
</body>
</html>
